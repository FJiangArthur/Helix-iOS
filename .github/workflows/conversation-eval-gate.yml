name: Helix Conversation Eval Gate

on:
  pull_request:
    branches: ["main"]
  push:
    branches: ["main"]
  workflow_dispatch:

concurrency:
  group: conversation-eval-${{ github.ref }}
  cancel-in-progress: true

jobs:
  conversation-eval:
    name: Live GPT, YouTube Audio, Simulator Eval
    runs-on: macos-latest
    timeout-minutes: 75

    env:
      HELIX_TEST_OPENAI_KEY: ${{ secrets.HELIX_TEST_OPENAI_KEY || secrets.OPENAI_API_KEY }}
      HELIX_YOUTUBE_EVAL_MANIFEST_JSON: ${{ secrets.HELIX_YOUTUBE_EVAL_MANIFEST_JSON }}
      HELIX_EVAL_OPENAI_MODEL: ${{ vars.HELIX_EVAL_OPENAI_MODEL || 'gpt-4.1-mini' }}
      HELIX_RUN_CONVERSATION_EVAL: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install audio tools
        run: |
          brew update
          brew install ffmpeg yt-dlp

      - name: Require live eval secrets
        run: |
          python3 - <<'PY'
          import os
          missing = [
              name for name in (
                  "HELIX_TEST_OPENAI_KEY",
                  "HELIX_YOUTUBE_EVAL_MANIFEST_JSON",
              )
              if not os.environ.get(name, "").strip()
          ]
          if missing:
              raise SystemExit(
                  "Missing required GitHub secret(s): " + ", ".join(missing)
              )
          PY

      - name: Enforce strict-gate guardrails
        run: |
          if [ "${HELIX_EVAL_SKIP_SIMULATOR:-0}" = "1" ]; then
            echo "HELIX_EVAL_SKIP_SIMULATOR is banned in CI strict eval"
            exit 1
          fi
          if grep -R "class _EvalProvider\|id => 'helix_eval'\|ToolExecutor.overrideForTesting" \
            lib/services/conversation_eval_gate.dart test/services/conversation_eval_gate_test.dart; then
            echo "Strict eval must not use deterministic eval providers or fake tool overrides"
            exit 1
          fi

      - name: Write YouTube eval manifest
        run: |
          mkdir -p test/fixtures/latency_corpus
          python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          raw = os.environ["HELIX_YOUTUBE_EVAL_MANIFEST_JSON"]
          data = json.loads(raw)
          if not isinstance(data, list) or not data:
              raise SystemExit("HELIX_YOUTUBE_EVAL_MANIFEST_JSON must be a non-empty JSON list")
          for item in data:
              for key in ("id", "sourceUrl", "license"):
                  if not str(item.get(key, "")).strip():
                      raise SystemExit(f"manifest item missing {key}")
              license_text = str(item.get("license", "")).lower()
              if "creative commons" not in license_text and "authorized" not in license_text:
                  raise SystemExit(
                      f"{item.get('id', '<unknown>')} must declare Creative Commons or user-authorized license"
                  )
          Path("test/fixtures/latency_corpus/youtube_manifest.local.json").write_text(
              json.dumps(data, indent=2)
          )
          PY

      - name: Prepare YouTube audio fixture
        run: bash scripts/setup_youtube_eval_audio.sh

      - name: Run strict conversation gate
        run: HELIX_RUN_CONVERSATION_EVAL=1 bash scripts/run_gate.sh

      - name: Upload eval report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: helix-conversation-eval-report
          path: |
            /tmp/Helix-QA/helix_eval_report.json
            /tmp/Helix-QA/helix_eval_report.md
          if-no-files-found: ignore
