name: Native iOS Gate

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    name: Build and validate native Swift app
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Native gate
        run: bash scripts/run_gate.sh

      - name: iOS simulator build
        run: |
          xcodebuild -workspace "ios/Even Companion.xcworkspace" \
            -scheme Runner \
            -configuration Debug \
            -destination 'generic/platform=iOS Simulator' \
            CODE_SIGNING_ALLOWED=NO \
            build
