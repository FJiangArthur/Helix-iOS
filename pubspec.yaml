name: flutter_helix
description: "Helix - Cross-platform companion app for Even Realities smart glasses"
publish_to: 'none'

version: 2.2.13+24

environment:
  sdk: ^3.9.0
  flutter: '>=3.35.0'

dependencies:
  flutter:
    sdk: flutter

  # UI and Material Design
  cupertino_icons: ^1.0.8
  
  # Audio Processing
  flutter_sound: 9.28.0
  
  # Platform Permissions
  permission_handler: ^12.0.1
  
  # Data Models and Serialization
  freezed_annotation: ^3.1.0
  json_annotation: ^4.8.1
  
  # State Management
  get: ^4.6.6
  
  # UI Components
  fluttertoast: ^9.0.0
  
  # Networking and Storage
  http: ^1.2.0
  flutter_secure_storage: ^10.0.0
  path_provider: ^2.1.5
  share_plus: ^12.0.1
  shared_preferences: ^2.2.0

  # Database
  drift: ^2.22.1
  sqlite3_flutter_libs: ^0.5.28
  uuid: ^4.5.1
  path: ^1.9.1

  # Utilities
  crclib: ^3.0.0
  intl: any
  logger: ^2.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter

  # Linting and Code Quality
  flutter_lints: ^6.0.0

  # Code Generation
  build_runner: ^2.4.7
  json_serializable: ^6.7.1
  freezed: ^3.2.5
  drift_dev: ^2.22.2

  # Testing
  mockito: ^5.4.4
  build_test: ^3.5.10

# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

# The following section is specific to Flutter packages.
flutter:
  uses-material-design: true

  # Add app icon
  # assets:
  #   - images/

  # Add custom fonts
  # fonts:
  #   - family: Schyler
  #     fonts:
  #       - asset: fonts/Schyler-Regular.ttf
